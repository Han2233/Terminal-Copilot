<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Copilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #333; background: #fff; }

    .header { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; background: #f9fafb; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .status { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }

    .section { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
    .section-title { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; }

    .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 12px; margin-right: 4px; margin-bottom: 4px; }
    .btn:hover { background: #f3f4f6; }
    .btn.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn.primary:hover { background: #2563eb; }

    .terminal-output { background: #1e1e1e; color: #d4d4d4; font-family: 'Menlo', 'Consolas', monospace; font-size: 11px; padding: 8px; border-radius: 6px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 8px; }

    .detection-result { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 8px; margin-top: 8px; font-size: 12px; }
    .detection-result.error { background: #fef2f2; border-color: #fecaca; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; }
    .info-grid .label { color: #6b7280; }
    .info-grid .value { font-weight: 500; }

    .command-input { display: flex; gap: 4px; margin-top: 8px; }
    .command-input input { flex: 1; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-family: monospace; font-size: 12px; }

    #log { max-height: 200px; overflow-y: auto; font-size: 11px; color: #6b7280; }
    #log .log-entry { padding: 2px 0; border-bottom: 1px solid #f9fafb; }
    #log .log-entry.success { color: #16a34a; }
    #log .log-entry.error { color: #dc2626; }

    /* 危险命令确认弹窗 */
    #confirmOverlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; padding: 12px; }
    #confirmOverlay.show { display: flex; }
    .confirm-box { background: #fff; border-radius: 10px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.15); overflow: hidden; }
    .confirm-header { padding: 14px 16px; border-bottom: 1px solid #fde68a; display: flex; align-items: center; gap: 8px; }
    .confirm-header.warn { background: #fffbeb; }
    .confirm-header.danger { background: #fef2f2; }
    .confirm-header .icon { font-size: 20px; }
    .confirm-header .title { font-size: 14px; font-weight: 700; }
    .confirm-header .title.warn { color: #92400e; }
    .confirm-header .title.danger { color: #991b1b; }
    .confirm-body { padding: 12px 16px; }
    .confirm-command { background: #1e1e1e; color: #fca5a5; font-family: monospace; font-size: 12px; padding: 8px; border-radius: 6px; word-break: break-all; margin-bottom: 10px; }
    .confirm-dangers { list-style: none; }
    .confirm-dangers li { padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .confirm-dangers li.high { background: #fffbeb; color: #92400e; }
    .confirm-dangers li.critical { background: #fef2f2; color: #991b1b; font-weight: 600; }
    .confirm-footer { padding: 10px 16px; border-top: 1px solid #f3f4f6; display: flex; gap: 8px; justify-content: flex-end; }
    .btn.danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn.danger:hover { background: #dc2626; }
    .btn.safe { background: #22c55e; color: #fff; border-color: #22c55e; }
    .btn.safe:hover { background: #16a34a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Terminal Copilot - POC</h1>
    <div class="status">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="statusText">未连接到终端页面</span>
    </div>
  </div>

  <!-- 危险命令确认弹窗 -->
  <div id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-header" id="confirmHeader">
        <span class="icon">⚠️</span>
        <span class="title" id="confirmTitle">危险命令确认</span>
      </div>
      <div class="confirm-body">
        <p style="font-size:12px;margin-bottom:6px;">AI Agent 请求执行以下命令：</p>
        <div class="confirm-command" id="confirmCommand"></div>
        <p style="font-size:11px;color:#6b7280;margin-bottom:4px;">触发的安全规则：</p>
        <ul class="confirm-dangers" id="confirmDangers"></ul>
      </div>
      <div class="confirm-footer">
        <button class="btn" id="btnDeny">🚫 拒绝</button>
        <button class="btn danger" id="btnApprove">⚠️ 我确认，允许执行</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">终端检测</div>
    <div>
      <button class="btn primary" id="btnDetect">检测终端</button>
      <button class="btn" id="btnReadDOM">读取 DOM</button>
      <button class="btn" id="btnReadBuffer">读取 Buffer (MAIN)</button>
    </div>
    <div id="detectionResult"></div>
  </div>

  <div class="section">
    <div class="section-title">终端内容</div>
    <div class="info-grid" id="termInfo" style="display:none">
      <span class="label">读取方式:</span><span class="value" id="readMethod">-</span>
      <span class="label">行数:</span><span class="value" id="rowCount">-</span>
    </div>
    <div class="terminal-output" id="terminalContent" style="display:none"></div>
  </div>

  <div class="section">
    <div class="section-title">命令输入测试</div>
    <div class="command-input">
      <input type="text" id="commandInput" placeholder="输入命令... (如 whoami)" />
      <button class="btn primary" id="btnSend">发送</button>
    </div>
    <div style="margin-top:4px; font-size:11px; color:#9ca3af;">命令会发送到 Web 终端执行（需先检测到终端）</div>
  </div>

  <div class="section">
    <div class="section-title">日志</div>
    <div id="log"></div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
